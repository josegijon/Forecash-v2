<!doctype html>
<html lang="es">

<head>
  <script>
    (function () {
      try {
        const stored = JSON.parse(localStorage.getItem("settings-storage") || "{}");
        const theme = stored?.state?.theme;
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        }
      } catch (_) { }
    })();
  </script>
  <meta charset="UTF-8" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/favicon/site.webmanifest">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e8f5e9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#060e09" media="(prefers-color-scheme: dark)">

  <!-- Og -->

</head>
